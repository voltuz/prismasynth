  <line x1="43" y1="31" x2="60" y2="27" stroke="#ff8a1e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="33" x2="60" y2="34" stroke="#ffd60a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="35" x2="60" y2="41" stroke="#30d158" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="37" x2="60" y2="48" stroke="#0a84ff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="43" y1="39" x2="60" y2="55" stroke="#bf5af2" stroke-width="2.5" stroke-linecap="round"/>
</svg>
