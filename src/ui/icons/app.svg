<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#1f2230"/>

  <!-- Incoming white ray -->
  <line x1="4" y1="32" x2="22" y2="32" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Prism triangle -->
